<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#00205B" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://script.google.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&family=EB+Garamond:wght@400;700&family=Roboto:wght@400;500;700&display=swap">
    <title>Buenos Aires Program</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: sans-serif; background: #F5F3F0; }
      /* iOS safe-area knobs (review backlog Tier 4 #12). Two tuning levers:
         --safe-top drives the header/gear/overlay-header top offset;
         --bap-nav-pad-bottom drives the bottom nav reservation (intentionally
         smaller than the full home-indicator inset, which read as over-padded)
         and everything anchored to the bottom. Defined at parse time so
         var()s resolve before first paint. On non-notched / non-iOS the
         env()s are 0, so max(16px, ...) preserves the prior flat layout. */
      :root {
        --safe-top: env(safe-area-inset-top);
        --safe-bottom: env(safe-area-inset-bottom);
        --bap-nav-pad-bottom: max(16px, calc(env(safe-area-inset-bottom) - 10px));
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
